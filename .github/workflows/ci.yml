name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  id-token: write # Required for OIDC
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
            pkg: ccc-linux-x64
            bin: ccc
            name: ccc-linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            pkg: ccc-linux-arm64
            bin: ccc
            name: ccc-linux-arm64

          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use-cross: true
            pkg: ccc-windows-x64
            bin: ccc.exe
            name: ccc-windows-x64.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            pkg: ccc-darwin-arm64
            bin: ccc
            name: ccc-darwin-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            pkg: ccc-darwin-x64
            bin: ccc
            name: ccc-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use-cross == true
        env:
          # Mount skill/ for build.rs (embeds SKILL.md into binary)
          CROSS_CONTAINER_OPTS: "-v ${{ github.workspace }}/skill:/skill:ro"
        run: cargo cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use-cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary for upload
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} "dist/${{ matrix.name }}"
          chmod +x "dist/${{ matrix.name }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ccc-*

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/**/ccc-*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Prepare npm packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version: $VERSION"

          # Copy binaries to package bin/ directories
          mkdir -p packages/ccc-linux-x64/bin
          mkdir -p packages/ccc-linux-arm64/bin
          mkdir -p packages/ccc-darwin-arm64/bin
          mkdir -p packages/ccc-darwin-x64/bin
          mkdir -p packages/ccc-windows-x64/bin

          cp artifacts/ccc-linux-x64/ccc-linux-x64 packages/ccc-linux-x64/bin/ccc
          cp artifacts/ccc-linux-arm64/ccc-linux-arm64 packages/ccc-linux-arm64/bin/ccc
          cp artifacts/ccc-darwin-arm64/ccc-darwin-arm64 packages/ccc-darwin-arm64/bin/ccc
          cp artifacts/ccc-darwin-x64/ccc-darwin-x64 packages/ccc-darwin-x64/bin/ccc
          cp artifacts/ccc-windows-x64/ccc-windows-x64.exe packages/ccc-windows-x64/bin/ccc.exe

          chmod +x packages/ccc-linux-x64/bin/ccc
          chmod +x packages/ccc-linux-arm64/bin/ccc
          chmod +x packages/ccc-darwin-arm64/bin/ccc
          chmod +x packages/ccc-darwin-x64/bin/ccc

          # Update version in all package.json files
          for pkg in ccc-linux-x64 ccc-linux-arm64 ccc-darwin-arm64 ccc-darwin-x64 ccc-windows-x64 ccc; do
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('packages/$pkg/package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('packages/$pkg/package.json', JSON.stringify(p, null, 2)+'\n');"
            echo "Updated $pkg to $VERSION"
          done

      - name: Publish platform packages to npm
        run: |
          for pkg in ccc-linux-x64 ccc-linux-arm64 ccc-darwin-arm64 ccc-darwin-x64 ccc-windows-x64; do
            echo "Publishing @weibaohui/$pkg..."
            cd packages/$pkg
            npm publish --provenance --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package to npm
        run: |
          cd packages/ccc
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
