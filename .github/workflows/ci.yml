name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
            artifact-name: ccc-linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            artifact-name: ccc-linux-arm64

          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            artifact-name: ccc-darwin-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            artifact-name: ccc-darwin-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            artifact-name: ccc-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/ccc${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Prepare packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version: $VERSION"

          # Copy binaries to package bin/ directories
          mkdir -p packages/ccc-linux-x64/bin
          mkdir -p packages/ccc-linux-arm64/bin
          mkdir -p packages/ccc-darwin-arm64/bin
          mkdir -p packages/ccc-darwin-x64/bin
          mkdir -p packages/ccc-windows-x64/bin

          cp artifacts/ccc-linux-x64/ccc packages/ccc-linux-x64/bin/ccc
          cp artifacts/ccc-linux-arm64/ccc packages/ccc-linux-arm64/bin/ccc
          cp artifacts/ccc-darwin-arm64/ccc packages/ccc-darwin-arm64/bin/ccc
          cp artifacts/ccc-darwin-x64/ccc packages/ccc-darwin-x64/bin/ccc
          cp artifacts/ccc-windows-x64/ccc.exe packages/ccc-windows-x64/bin/ccc.exe

          chmod +x packages/ccc-linux-x64/bin/ccc
          chmod +x packages/ccc-linux-arm64/bin/ccc
          chmod +x packages/ccc-darwin-arm64/bin/ccc
          chmod +x packages/ccc-darwin-x64/bin/ccc

          # Update version in all package.json files
          for pkg in ccc-linux-x64 ccc-linux-arm64 ccc-darwin-arm64 ccc-darwin-x64 ccc-windows-x64 ccc; do
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('packages/$pkg/package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('packages/$pkg/package.json', JSON.stringify(p, null, 2)+'\\n');"
            echo "Updated $pkg to $VERSION"
          done

      - name: Publish platform packages to npm
        run: |
          for pkg in ccc-linux-x64 ccc-linux-arm64 ccc-darwin-arm64 ccc-darwin-x64 ccc-windows-x64; do
            echo "Publishing @weibaohui/$pkg..."
            cd packages/$pkg
            npm publish --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package to npm
        run: |
          cd packages/ccc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/ccc*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
